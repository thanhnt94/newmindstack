<script>


    window.showFlashMessage = function (message, category) {
        const container = document.getElementById('flash-messages-container');
        if (!container) return;
        const alertDiv = document.createElement('div');
        alertDiv.className = `flex items-center p-2 rounded-md shadow-lg bg-gray-800 text-white relative text-sm
transition-opacity duration-500 opacity-100 data-dismissible`;
        alertDiv.innerHTML = `<i class="fas fa-info-circle mr-2"></i><span>${message}</span><button class="ml-auto pl-2"
    onclick="this.parentNode.remove()">&times;</button>`;
        if (category === 'success') alertDiv.classList.add('bg-green-500');
        else if (category === 'danger') alertDiv.classList.add('bg-red-500');
        else if (category === 'info') alertDiv.classList.add('bg-blue-500');
        else if (category === 'warning') alertDiv.classList.add('bg-yellow-500');
        else alertDiv.classList.add('bg-gray-500');

        container.appendChild(alertDiv);
        setTimeout(() => alertDiv.classList.remove('opacity-0'), 10);
        setTimeout(() => {
            alertDiv.classList.add('opacity-0');
            setTimeout(() => alertDiv.remove(), 500);
        }, 5000);
    };

    // Hàm loadTabContent này sẽ được cập nhật để tải nội dung AJAX cho các tab trong content_dashboard
    // Tuy nhiên, ở đây nó đang được sử dụng để reload trang.
    // Cần lưu ý nếu có xung đột với logic AJAX của content_dashboard
    window.loadTabContent = function (tabName) {
        window.location.reload();
    };

    // --- VOCAB DETAIL VISUALIZATIONS ---
    window.initVocabDetailCharts = function (container = document) {
        const statsContainer = container.querySelector('.stats-container');
        if (!statsContainer) return;

        const historyJson = statsContainer.getAttribute('data-history');
        if (!historyJson) return;

        let history = [];
        try {
            history = JSON.parse(historyJson);
        } catch (e) { console.error("History parse fail", e); return; }

        if (!history || history.length === 0) return;

        // 1. STABILITY TREND CHART
        const chartCanvas = statsContainer.querySelector('#fsrsHistoryChart');
        if (chartCanvas && typeof Chart !== 'undefined') {
            const labels = history.map(h => {
                const d = new Date(h.timestamp);
                return d.getDate() + '/' + (d.getMonth() + 1);
            }).reverse();

            const stabilityData = history.map(h => {
                const s = (h.fsrs_snapshot && h.fsrs_snapshot.stability) ? h.fsrs_snapshot.stability : 0;
                // If stability is 0, let's look at result for visual feedback on new cards
                return s > 0 ? s : (h.result === 'Correct' ? 0.5 : 0.1);
            }).reverse();

            // Destroy existing if any (important for modal re-opens)
            const existingChart = Chart.getChart(chartCanvas);
            if (existingChart) existingChart.destroy();

            new Chart(chartCanvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Độ ổn định (S)',
                        data: stabilityData,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.05)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointRadius: stabilityData.length > 20 ? 0 : 3,
                        pointBackgroundColor: '#6366f1'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f1f5f9' },
                            ticks: { font: { size: 9 }, color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { size: 9 },
                                color: '#94a3b8',
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 6
                            }
                        }
                    }
                }
            });
        }

        // 1.2 FORGETTING CURVE CHART
        const curveCanvas = statsContainer.querySelector('#forgettingCurveChart');
        const curveData = statsContainer.getAttribute('data-forgetting-curve'); // We need to add this to the container!

        if (curveCanvas && typeof Chart !== 'undefined') {
            let curvePoints = [];
            try {
                curvePoints = JSON.parse(curveData || '[]');
            } catch (e) { }

            if (curvePoints.length > 0) {
                const existingCurve = Chart.getChart(curveCanvas);
                if (existingCurve) existingCurve.destroy();

                new Chart(curveCanvas, {
                    type: 'line',
                    data: {
                        labels: curvePoints.map(p => `Ngày ${p.day}`),
                        datasets: [{
                            label: 'Khả năng nhớ (R)',
                            data: curvePoints.map(p => p.retrievability),
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.05)',
                            borderWidth: 2,
                            tension: 0.3,
                            fill: true,
                            pointRadius: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: (context) => `Khả năng nhớ: ${context.raw}%`
                                }
                            }
                        },
                        scales: {
                            y: {
                                min: 0, max: 100,
                                grid: { color: '#f1f5f9' },
                                ticks: { font: { size: 9 }, color: '#94a3b8' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 9 }, color: '#94a3b8' }
                            }
                        }
                    }
                });
            }
        }

        // 2. ACTIVITY HEATMAP (GitHub Style)
        const heatmapWrap = statsContainer.querySelector('#activity-heatmap');
        if (heatmapWrap) {
            heatmapWrap.innerHTML = ''; // Clear
            const weeks = 24;
            const daysPerWeek = 7;
            const totalDays = weeks * daysPerWeek;

            const now = new Date();
            const activityMap = {};

            // Map history dates to 'YYYY-MM-DD'
            history.forEach(h => {
                const dateKey = new Date(h.timestamp).toISOString().split('T')[0];
                activityMap[dateKey] = (activityMap[dateKey] || 0) + 1;
            });

            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = `repeat(${weeks}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${daysPerWeek}, 1fr)`;
            grid.style.gap = '3px';
            grid.style.width = 'fit-content';

            for (let i = 0; i < totalDays; i++) {
                const d = new Date(now);
                d.setDate(d.getDate() - (totalDays - 1 - i));
                const dateKey = d.toISOString().split('T')[0];
                const count = activityMap[dateKey] || 0;

                const cell = document.createElement('div');
                cell.style.width = '12px';
                cell.style.height = '12px';
                cell.style.borderRadius = '2px';
                cell.title = `${dateKey}: ${count} lần học`;

                // Colors
                if (count === 0) cell.style.background = '#f1f5f9';
                else if (count === 1) cell.style.background = '#c7d2fe';
                else if (count === 2) cell.style.background = '#818cf8';
                else cell.style.background = '#4f46e5';

                grid.appendChild(cell);
            }
            heatmapWrap.appendChild(grid);
        }

        // 3. LEARNING TREND CHART (Cumulative)
        const trendCanvas = statsContainer.querySelector('#learningTrendChart');
        if (trendCanvas && typeof Chart !== 'undefined') {
            const sortedHistory = [...history].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            const trendData = [];
            let cumulative = 0;

            // Group by date and calculate cumulative
            const dateMap = {};
            sortedHistory.forEach(h => {
                const d = new Date(h.timestamp).toLocaleDateString();
                dateMap[d] = (dateMap[d] || 0) + 1;
            });

            const labels = Object.keys(dateMap);
            labels.forEach(date => {
                cumulative += dateMap[date];
                trendData.push(cumulative);
            });

            const existingTrend = Chart.getChart(trendCanvas);
            if (existingTrend) existingTrend.destroy();

            new Chart(trendCanvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Tổng số lượt học',
                        data: trendData,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.05)',
                        borderWidth: 2,
                        tension: 0.1,
                        fill: true,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 }, color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#94a3b8', maxTicksLimit: 5 } }
                    }
                }
            });
        }

        // 4. RESULT DISTRIBUTION CHART (Doughnut)
        const distCanvas = statsContainer.querySelector('#resultDistributionChart');
        if (distCanvas && typeof Chart !== 'undefined') {
            const correctCount = history.filter(h => h.result === 'Correct').length;
            const incorrectCount = history.length - correctCount;

            const existingDist = Chart.getChart(distCanvas);
            if (existingDist) existingDist.destroy();

            new Chart(distCanvas, {
                type: 'doughnut',
                data: {
                    labels: ['Đúng', 'Sai'],
                    datasets: [{
                        data: [correctCount, incorrectCount],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 }, usePointStyle: true } }
                    }
                }
            });
        }

        // 5. ACCURACY OVER TIME CHART (Line) — rolling accuracy
        const accCanvas = statsContainer.querySelector('#accuracyTrendChart');
        if (accCanvas && typeof Chart !== 'undefined') {
            const sortedH = [...history].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            let correctRun = 0;
            const accLabels = [];
            const accData = [];
            sortedH.forEach((h, i) => {
                if (h.result === 'Correct') correctRun++;
                const accPct = Math.round((correctRun / (i + 1)) * 100);
                accData.push(accPct);
                const d = new Date(h.timestamp);
                accLabels.push(d.getDate() + '/' + (d.getMonth() + 1));
            });

            const existingAcc = Chart.getChart(accCanvas);
            if (existingAcc) existingAcc.destroy();

            new Chart(accCanvas, {
                type: 'line',
                data: {
                    labels: accLabels,
                    datasets: [{
                        label: 'Tỷ lệ đúng (%)',
                        data: accData,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.06)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: accData.length > 20 ? 0 : 3,
                        pointBackgroundColor: '#10b981'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 0, max: 100, grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 }, color: '#94a3b8', callback: v => v + '%' } },
                        x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#94a3b8', maxTicksLimit: 6 } }
                    }
                }
            });
        }

        // 6. REVIEW DURATION CHART (Bar) — time per review
        const durCanvas = statsContainer.querySelector('#reviewDurationChart');
        if (durCanvas && typeof Chart !== 'undefined') {
            const sortedH2 = [...history].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            const durLabels = sortedH2.map(h => {
                const d = new Date(h.timestamp);
                return d.getDate() + '/' + (d.getMonth() + 1);
            });
            const durData = sortedH2.map(h => ((h.duration_ms || 0) / 1000).toFixed(1));
            const durColors = sortedH2.map(h => h.result === 'Correct' ? '#10b981' : '#ef4444');

            const existingDur = Chart.getChart(durCanvas);
            if (existingDur) existingDur.destroy();

            new Chart(durCanvas, {
                type: 'bar',
                data: {
                    labels: durLabels,
                    datasets: [{
                        label: 'Thời gian (s)',
                        data: durData,
                        backgroundColor: durColors,
                        borderRadius: 4,
                        barPercentage: 0.7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 }, color: '#94a3b8', callback: v => v + 's' } },
                        x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#94a3b8', maxTicksLimit: 8, maxRotation: 0 } }
                    }
                }
            });
        }
    };

    document.addEventListener('DOMContentLoaded', function () {
        // Tự động đóng flash messages
        document.querySelectorAll('[data-dismissible]').forEach(notification => {
            setTimeout(() => {
                notification.classList.add('opacity-0');
                setTimeout(() => notification.remove(), 500);
            }, 5000);
        });


        function initHubCharts() {
            // 1. Mastery Distribution (Doughnut)
            const masteryCanvas = document.getElementById('masteryDistributionChart');
            if (masteryCanvas && masteryCanvas.dataset.dist) {
                try {
                    const dist = JSON.parse(masteryCanvas.dataset.dist);
                    new Chart(masteryCanvas, {
                        type: 'doughnut',
                        data: {
                            labels: ['Mới', 'Đang học', 'Ôn tập', 'Thành thạo'],
                            datasets: [{
                                data: [dist.new, dist.learning, dist.review, dist.mastered],
                                backgroundColor: ['#f1f5f9', '#e0e7ff', '#c7d2fe', '#4f46e5'],
                                borderWidth: 0,
                                weight: 1
                            }]
                        },
                        options: {
                            cutout: '75%',
                            plugins: { legend: { display: false }, tooltip: { enabled: true } },
                            maintainAspectRatio: false
                        }
                    });
                } catch (e) { console.error("Error init mastery chart", e); }
            }

            // 2. Memory Trend Sparkline
            const trendCanvas = document.getElementById('memoryTrendSparkline');
            if (trendCanvas && trendCanvas.dataset.trend) {
                try {
                    const trend = JSON.parse(trendCanvas.dataset.trend);
                    new Chart(trendCanvas, {
                        type: 'line',
                        data: {
                            labels: trend.map((_, i) => i),
                            datasets: [{
                                data: trend,
                                borderColor: '#e11d48',
                                borderWidth: 2,
                                pointRadius: 0,
                                fill: true,
                                backgroundColor: 'rgba(225, 29, 72, 0.1)',
                                tension: 0.4
                            }]
                        },
                        options: {
                            plugins: { legend: { display: false }, tooltip: { enabled: false } },
                            scales: { x: { display: false }, y: { display: false } },
                            maintainAspectRatio: false
                        }
                    });
                } catch (e) { console.error("Error init trend chart", e); }
            }
        }

        // Auto-init Hub charts if on hub page
        if (document.querySelector('.premium-header')) {
            initHubCharts();
        }
    });
</script>
