{# Reusable Item Stats Modal #}
<link rel="stylesheet" href="{{ url_for('aura_mobile.static', filename='vocabulary/css/vocab_hub.css') }}">
<div id="item-stats-modal" class="aura-modal-overlay" style="padding: 0.75rem;">
    <div class="aura-modal-container"
        style="max-width: 900px; height: 100%; max-height: none !important; display: flex; flex-direction: column; background: #ffffff; border-radius: 1rem;">
        <div id="item-stats-container" class="aura-modal-body" style="padding: 0; flex: 1; overflow-y: auto;">
            <!-- Content loaded here -->
        </div>
    </div>
</div>

<!-- Edit Overlay Modal (appears on top of stats modal) -->
<div id="vocab-edit-overlay-modal" class="aura-modal-overlay" style="z-index: 100001;">
    <div class="aura-modal-container" style="max-width: 900px; height: 90vh; display: flex; flex-direction: column;">
        <div class="aura-modal-header" style="flex-shrink: 0;">
            <h3 style="margin: 0; font-size: 1.1rem; font-weight: 700;">Chỉnh sửa</h3>
            <button class="aura-modal-close" onclick="closeVocabEditOverlay()">&times;</button>
        </div>
        <div class="aura-modal-body" style="padding: 0; flex: 1; overflow: hidden; position: relative;">
            <iframe id="vocab-edit-iframe" src="" frameborder="0"
                style="width: 100%; height: 100%; border: none;"></iframe>
            <div id="vocab-edit-loading"
                style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; color: #6366f1; gap: 0.75rem;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i>
                <span>Đang tải...</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        // [EDIT OVERLAY FUNCTIONS]
        window.openVocabEditOverlay = function (editUrl) {
            const overlay = document.getElementById('vocab-edit-overlay-modal');
            const iframe = document.getElementById('vocab-edit-iframe');
            const loading = document.getElementById('vocab-edit-loading');
            if (!overlay || !iframe) return;

            overlay.classList.add('active');
            if (loading) loading.style.display = 'flex';
            iframe.style.visibility = 'hidden';

            // Append is_modal=true
            const separator = editUrl.includes('?') ? '&' : '?';
            iframe.src = editUrl + separator + 'is_modal=true';

            iframe.onload = function () {
                if (loading) loading.style.display = 'none';
                iframe.style.visibility = 'visible';
            };
        };

        window.closeVocabEditOverlay = function () {
            const overlay = document.getElementById('vocab-edit-overlay-modal');
            const iframe = document.getElementById('vocab-edit-iframe');
            if (overlay) overlay.classList.remove('active');
            if (iframe) iframe.src = '';
        };

        // [MARKER FUNCTION]
        window.toggleVocabMarker = function (itemId, markerType, btn) {
            if (!btn) return;
            const icon = btn.querySelector('i');
            btn.disabled = true;

            fetch(`/learn/vocabulary/api/progress/${itemId}/marker`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || ''
                },
                body: JSON.stringify({ marker: markerType })
            })
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false;
                    if (data.success) {
                        const markers = data.markers || [];
                        const isMarked = markers.includes(markerType);
                        if (isMarked) {
                            if (markerType !== 'difficult') {
                                icon.classList.remove('far');
                                icon.classList.add('fas');
                            }
                            btn.classList.add('active');
                            if (markerType === 'difficult') {
                                btn.style.background = '#ffedd5';
                                btn.style.color = '#ea580c';
                            } else if (markerType === 'ignored') {
                                btn.style.background = '#cbd5e1';
                                btn.style.color = '#475569';
                            } else if (markerType === 'favorite') {
                                btn.style.background = '#ffe4e6';
                                btn.style.color = '#e11d48';
                            }
                        } else {
                            if (markerType !== 'difficult') {
                                icon.classList.remove('fas');
                                icon.classList.add('far');
                            }
                            btn.classList.remove('active');
                            btn.style.background = 'white';
                            btn.style.color = '#94a3b8';
                        }
                    } else {
                        alert('Lỗi: ' + (data.message || 'Không rõ nguyên nhân'));
                    }
                })
                .catch(err => {
                    console.error(err);
                    btn.disabled = false;
                });
        };

        window.toggleNoteEdit = function (showEdit) {
            const displayMode = document.getElementById('note-display-mode');
            const editMode = document.getElementById('note-edit-mode');
            if (displayMode && editMode) {
                displayMode.style.display = showEdit ? 'none' : 'block';
                editMode.style.display = showEdit ? 'block' : 'none';
                if (showEdit) {
                    const input = document.getElementById('item-note-input');
                    if (input) input.focus();
                }
            }
        };



        window.saveItemNote = function (itemId) {
            const btn = document.getElementById('save-note-btn');
            const input = document.getElementById('item-note-input');
            if (!btn || !input) return;

            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';

            let csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';

            fetch('/learn/vocabulary/api/progress/' + itemId + '/note', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ note: input.value })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        btn.innerHTML = '<i class="fas fa-check"></i> Đã lưu';
                        btn.style.background = '#10b981';
                        const staticContent = document.getElementById('note-static-content');
                        if (staticContent) staticContent.textContent = input.value || "Chưa có ghi chú nào.";
                        setTimeout(() => {
                            btn.innerHTML = originalText;
                            btn.style.background = '#4f46e5';
                            btn.disabled = false;
                            toggleNoteEdit(false);
                        }, 1000);
                    } else {
                        alert('Lỗi: ' + data.message);
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Lỗi kết nối');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
        };

        // --- ENHANCED TAB-BASED AI FUNCTIONS ---
        window.toggleStatsAiChat = function () {
            const el = document.getElementById('stats-ai-chat-input');
            if (el) {
                el.classList.toggle('hidden');
                if (!el.classList.contains('hidden')) document.getElementById('stats-ai-question')?.focus();
            }
        };

        window.scrollAiTabs = function (direction) {
            const container = document.getElementById('stats-ai-version-tabs');
            if (container) {
                container.scrollBy({ left: direction * 150, behavior: 'smooth' });
            }
        };

        window.loadStatsAiHistory = function (itemId) {
            const tabsContainer = document.getElementById('stats-ai-version-tabs');
            if (!tabsContainer) return;

            fetch('/learn/ai/ai/item/' + itemId + '/contents?type=explanation')
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.contents.length > 0) {
                        renderAiSessionTabs(data.contents, itemId);
                        // Auto preview primary or newest
                        const primary = data.contents.find(c => c.is_primary) || data.contents[0];
                        previewStatsAiContent(primary);
                    } else {
                        tabsContainer.innerHTML = '<div class="text-[10px] text-slate-400 py-1">Chưa có dữ liệu AI.</div>';
                        document.getElementById('stats-ai-content-box').innerHTML = '<div class="text-center text-slate-300 py-12"><i class="fas fa-robot text-4xl mb-3 opacity-20"></i><p class="text-xs">Hãy bấm nút phía trên để AI phân tích.</p></div>';
                    }
                })
                .catch(err => {
                    tabsContainer.innerHTML = '<div class="text-[10px] text-red-400 py-1">Lỗi kết nối.</div>';
                });
        };

        window.renderAiSessionTabs = function (contents, itemId) {
            const container = document.getElementById('stats-ai-version-tabs');
            if (!container) return;

            container.innerHTML = contents.map((c, idx) => {
                const rawTitle = c.user_question ? c.user_question : 'Giải thích gốc';
                // Truncate for tab title
                const displayTitle = rawTitle.length > 15 ? rawTitle.substring(0, 15) + '...' : rawTitle;
                const activeClass = c.is_primary ? 'active' : '';

                return `
                    <div class="ai-session-tab ${activeClass}" 
                         onclick="previewStatsAiContent(${JSON.stringify(c).replace(/"/g, '&quot;')}, this)"
                         title="${rawTitle}">
                        ${displayTitle}
                    </div>
                `;
            }).join('');
        };

        window.previewStatsAiContent = function (contentObj, el) {
            if (el) {
                document.querySelectorAll('.ai-session-tab').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            }

            const box = document.getElementById('stats-ai-content-box');
            if (!box) return;

            // 1. Show Full Question Box if it exists
            const fullQuestionBox = document.getElementById('stats-ai-full-question-box');
            const fullQuestionText = document.getElementById('stats-ai-full-question-text');
            if (contentObj.user_question) {
                fullQuestionBox.classList.remove('hidden');
                fullQuestionText.textContent = '" ' + contentObj.user_question + ' "';
            } else {
                fullQuestionBox.classList.add('hidden');
            }

            // 2. Update Meta Header
            document.getElementById('stats-ai-author').textContent = contentObj.username || 'Hệ thống';
            document.getElementById('stats-ai-model').textContent = (contentObj.model_name || 'AI Coach').toUpperCase();
            document.getElementById('stats-ai-date').textContent = new Date(contentObj.created_at).toLocaleString('vi-VN');

            const typeLabel = document.getElementById('stats-ai-type-label');
            if (typeLabel) {
                typeLabel.textContent = contentObj.user_question ? 'Hỏi đáp' : 'Giải thích';
                typeLabel.className = contentObj.user_question ?
                    'text-[8px] font-black text-white uppercase bg-indigo-500 px-2 py-0.5 rounded-full' :
                    'text-[8px] font-black text-white uppercase bg-slate-400 px-2 py-0.5 rounded-full';
            }

            // 3. Render Answer Content
            const content = contentObj.content_text;
            if (window.renderMarkdown) {
                box.innerHTML = window.renderMarkdown(content);
            } else if (typeof mistune !== 'undefined') {
                box.innerHTML = mistune.html(content);
            } else {
                box.innerHTML = content.replace(/\n/g, '<br>');
            }

            // 4. Update Footer Actions
            const footer = document.getElementById('stats-ai-footer-actions');
            if (footer) {
                footer.innerHTML = !contentObj.is_primary ? `
                    <button onclick="handleSetPrimaryStatsAiContent(${contentObj.content_id}, ${contentObj.item_id})" class="px-3 py-1 bg-white border border-slate-200 text-slate-600 rounded-lg text-[10px] font-bold hover:text-indigo-600 hover:border-indigo-200 transition-all">
                        <i class="fas fa-thumbtack"></i> Ghim mặc định
                    </button>
                ` : '<span class="text-[10px] font-bold text-indigo-500 italic px-2"><i class="fas fa-check-circle"></i> Bản mặc định</span>';
            }
        };

        window.submitStatsAiQuestion = function (itemId) {
            const input = document.getElementById('stats-ai-question');
            const val = input.value.trim();
            if (!val) return;

            generateStatsAIExplanation(itemId, true, val);
            input.value = '';
            toggleStatsAiChat();
        };

        window.handleSetPrimaryStatsAiContent = function (cid, itemId) {
            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            fetch('/learn/ai/ai/content/' + cid + '/set-primary', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrfToken }
            }).then(() => {
                loadStatsAiHistory(itemId);
            });
        };

        window.generateStatsAIExplanation = function (itemId, force = false, customQuestion = null) {
            const box = document.getElementById('stats-ai-content-box');
            if (!box) return;

            box.innerHTML = '<div class="flex flex-col items-center justify-center py-12 text-indigo-500"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p class="text-[10px] font-bold animate-pulse">AI ĐANG PHÂN TÍCH...</p></div>';

            let csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';

            fetch('/learn/ai/ai/get-ai-response', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({
                    item_id: itemId,
                    prompt_type: 'explanation',
                    force_regenerate: force,
                    custom_question: customQuestion
                })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        loadStatsAiHistory(itemId);
                    } else {
                        box.innerHTML = '<div class="text-red-500 p-4 text-center text-xs">Lỗi: ' + data.message + '</div>';
                    }
                })
                .catch(err => {
                    box.innerHTML = '<div class="text-red-500 p-4 text-center text-xs">Lỗi kết nối.</div>';
                });
        };


        // --- TAB SWITCHING FUNCTIONS ---
        window.switchVocabMainTab = function (targetTabId, btn) {
            if (window.event) window.event.preventDefault();
            const container = btn.closest('.stats-container');
            if (!container) return;
            const tabBtns = container.querySelectorAll('.tab-navigation .tab-btn');
            const tabContents = container.querySelectorAll('.tab-content');
            const subNav = container.querySelector('#header-sub-tabs');

            tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === targetTabId));
            tabContents.forEach(content => {
                const id = content.id.replace('tab-', '');
                if (id === targetTabId) {
                    // Both tabs use flex layout
                    content.style.display = 'flex';
                    content.classList.add('active');
                } else {
                    content.style.display = 'none';
                    content.classList.remove('active');
                }
            });
            if (subNav) subNav.style.display = (targetTabId === 'content') ? 'flex' : 'none';

            if (targetTabId === 'stats') {
                // Always auto-select overview sub-tab to prevent blank screen
                const statsTab = container.querySelector('#tab-stats') || container;
                const overviewBtn = statsTab.querySelector('.sub-tab-btn[data-subtab="sub-overview"]');
                if (overviewBtn) {
                    setTimeout(() => window.switchVocabSubTab('sub-overview', overviewBtn), 50);
                }
                if (window.initVocabDetailCharts) {
                    window.initVocabDetailCharts(container);
                }
            } else if (targetTabId === 'content') {
                // Auto-restore flashcard sub-tab when switching back to Chi tiết
                const contentTab = container.querySelector('#tab-content');
                if (contentTab) {
                    const activeContentSub = contentTab.querySelector('.sub-tab-content.active') || contentTab.querySelector('.sub-tab-content');
                    if (activeContentSub) {
                        activeContentSub.style.display = 'block';
                        activeContentSub.classList.add('active');
                        // Find and active the corresponding button in header-sub-tabs
                        const subBtn = container.querySelector(`.sub-tab-btn[data-subtab="${activeContentSub.id}"]`);
                        if (subBtn) subBtn.classList.add('active');
                    }
                }
            }
        };

        window.switchVocabSubTab = function (targetSubId, btn) {
            if (window.event) window.event.preventDefault();
            const container = btn.closest('.stats-container') || document.getElementById('item-stats-container');
            if (!container) return;
            // Smart scope: determine parent tab based on which sub-tab group we're targeting
            const contentSubIds = ['sub-flashcard', 'sub-ai', 'sub-media'];
            const isContentSub = contentSubIds.includes(targetSubId);
            const parentTab = isContentSub
                ? (container.querySelector('#tab-content') || container)
                : (container.querySelector('#tab-stats') || btn.closest('.tab-content') || container);
            const subBtns = parentTab.querySelectorAll('.sub-tab-btn');
            const subContents = parentTab.querySelectorAll('.sub-tab-content');
            // Also toggle header-sub-tabs buttons if switching content sub-tabs
            if (isContentSub) {
                const headerBtns = container.querySelectorAll('#header-sub-tabs .sub-tab-btn');
                headerBtns.forEach(b => b.classList.toggle('active', b.dataset.subtab === targetSubId));
            }
            subBtns.forEach(b => b.classList.toggle('active', b.dataset.subtab === targetSubId));

            // Toggle scrollable wrapper: sub-detail handles its own scroll
            const scrollWrapper = container.querySelector('#tab-stats > div:last-of-type') || container.querySelector('[style*="overflow-y: auto"]');
            if (scrollWrapper) {
                if (targetSubId === 'sub-detail') {
                    scrollWrapper.style.overflowY = 'hidden';
                    scrollWrapper.style.display = 'flex';
                    scrollWrapper.style.flexDirection = 'column';
                } else {
                    scrollWrapper.style.overflowY = 'auto';
                    scrollWrapper.style.display = 'block';
                }
            }


            subContents.forEach(content => {
                if (content.id === targetSubId) {
                    content.style.display = (targetSubId === 'sub-detail') ? 'flex' : 'block';
                    content.classList.add('active');

                    // Auto-select first history item if in chi tiết tab
                    if (targetSubId === 'sub-detail') {
                        const firstHist = content.querySelector('.js-history-item');
                        if (firstHist && typeof window.selectHistoryItemV3 === 'function') {
                            window.selectHistoryItemV3(firstHist, 0);
                        }
                    }

                    // Re-init charts if switching to charts sub-tab
                    if (targetSubId === 'sub-charts' && window.initVocabDetailCharts) {
                        window.initVocabDetailCharts(container);
                        // Explicitly trigger activity heatmap
                        if (window.renderActivityHeatmap) {
                            const heatmapEl = document.getElementById('activity-heatmap');
                            if (heatmapEl) window.renderActivityHeatmap(heatmapEl);
                        }
                    }

                    // Specific Logic for AI and History
                    if (targetSubId === 'sub-ai' && typeof window.loadStatsAiHistory === 'function') {
                        const markerBtn = container.querySelector('.js-toggle-vocab-marker');
                        const itemId = markerBtn?.getAttribute('onclick')?.match(/\d+/)?.[0];
                        if (itemId) window.loadStatsAiHistory(itemId);
                    }
                } else {
                    content.style.display = 'none';
                    content.classList.remove('active');
                }
            });
        };

        window.toggleSubTabs = function (isContent) {
            const container = document.querySelector('.stats-container');
            if (!container) return;
            const targetBtn = container.querySelector(`.tab-btn[data-tab="${isContent ? 'content' : 'notes'}"]`);
            if (targetBtn) window.switchVocabMainTab(isContent ? 'content' : 'notes', targetBtn);
        };

        window.selectHistoryItemV3 = function (element, index) {
            // 1. Highlight selected item
            document.querySelectorAll('.js-history-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // 2. GetData from container
            const container = element.closest('.stats-container');
            if (!container) return;

            let history = [];
            try {
                history = JSON.parse(container.getAttribute('data-history') || '[]');
            } catch (e) {
                console.error("Failed to parse history", e);
                return;
            }

            const log = history[index];
            if (!log) return;

            // 3. Update Detail Bar
            const resultEl = document.getElementById('hist-result');
            const modeEl = document.getElementById('hist-mode-badge');
            const timeEl = document.getElementById('hist-time');
            const durEl = document.getElementById('hist-duration');
            const scoreEl = document.getElementById('hist-score');
            const masteryEl = document.getElementById('hist-mastery');




            // Result Style
            if (resultEl) {
                if (log.result === 'Correct') {
                    resultEl.innerHTML = '<i class="fas fa-check-circle"></i> Đúng';
                    resultEl.style.backgroundColor = '#dcfce7';
                    resultEl.style.color = '#16a34a';
                } else {
                    resultEl.innerHTML = '<i class="fas fa-times-circle"></i> Sai';
                    resultEl.style.backgroundColor = '#fee2e2';
                    resultEl.style.color = '#dc2626';
                }
            }

            // Mode
            if (modeEl) {
                const modeIconMap = { 'mcq': 'fa-list-ul', 'flashcard': 'fa-clone', 'typing': 'fa-keyboard' };
                const iconClass = modeIconMap[log.mode?.toLowerCase()] || 'fa-layer-group';
                modeEl.innerHTML = `<i class="fas ${iconClass}" style="font-size: 0.7rem; color: #94a3b8;"></i> ${log.mode || 'N/A'}`;
            }

            // Format relative time
            if (timeEl) {
                const date = new Date(log.timestamp);
                timeEl.textContent = date.toLocaleDateString('vi-VN') + ' ' + date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
            }

            // Duration
            if (durEl) {
                const durSec = ((log.duration_ms || 0) / 1000).toFixed(1);
                durEl.innerHTML = `${durSec}<span style="font-size: 0.65rem; color: #94a3b8; margin-left: 2px;">s</span>`;
            }

            // Score (Detailed from gamification_snapshot if available)
            if (scoreEl) {
                const gami = log.gamification_snapshot || {};
                const scoreChange = log.score_change || gami.total_score || 0;

                if (scoreChange > 0) {
                    let scoreHtml = `<span style="color: #f59e0b;">+${scoreChange}</span>`;

                    if (gami.breakdown && Object.keys(gami.breakdown).length > 0) {
                        scoreHtml += `<div style="font-size: 0.55rem; color: #94a3b8; font-weight: 600; margin-top: 4px; text-transform: none; display: flex; flex-direction: column; gap: 2px; align-items: center; border-top: 1px dashed #e2e8f0; padding-top: 4px; width: 100%;">`;

                        const labelMap = {
                            'base': 'Cơ bản',
                            'difficulty': 'Độ khó',
                            'streak': 'Chuỗi',
                            'streak_bonus': 'Chuỗi',
                            'time': 'Tốc độ',
                            'time_bonus': 'Tốc độ'
                        };

                        let lines = 0;
                        for (const [key, val] of Object.entries(gami.breakdown)) {
                            if (key !== 'total' && val !== 0 && lines < 3) { // limit 3 lines max
                                const lbl = labelMap[key] || key;
                                const valStr = (typeof val === 'number' && val > 0 && val < 1) ? `x${val}` : `+${Math.round(val)}`;
                                scoreHtml += `<div style="display: flex; justify-content: space-between; width: 100%;"><span style="color: #cbd5e1;">${lbl}</span> <span style="color: #f59e0b;">${valStr}</span></div>`;
                                lines++;
                            }
                        }
                        scoreHtml += `</div>`;
                    } else {
                        // Fallback
                        const scoreBase = log.score_base || Math.max(0, scoreChange - (log.score_bonus || 0));
                        const scoreBonus = log.score_bonus || Math.max(0, scoreChange - scoreBase);
                        if (scoreBase > 0 || scoreBonus > 0) {
                            scoreHtml += `<div style="font-size: 0.55rem; color: #94a3b8; font-weight: 600; margin-top: 2px; text-transform: none;">`;
                            if (scoreBase > 0) scoreHtml += `Cơ bản: +${scoreBase}`;
                            if (scoreBonus > 0) scoreHtml += ` | Thưởng: +${scoreBonus}`;
                            scoreHtml += `</div>`;
                        }
                    }

                    scoreEl.innerHTML = `
                        <div style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; line-height: 1; width: 100%;">
                            ${scoreHtml}
                        </div>
                    `;
                } else {
                    scoreEl.innerHTML = `<span style="color: #94a3b8;">0</span>`;
                }
            }

            // Mastery (Stability) — now its own box
            if (masteryEl) {
                if (log.fsrs_snapshot && log.fsrs_snapshot.stability !== undefined) {
                    masteryEl.textContent = parseFloat(log.fsrs_snapshot.stability).toFixed(1);
                } else {
                    masteryEl.textContent = '-';
                }
            }

            // Difficulty — separate box
            const diffEl = document.getElementById('hist-difficulty');
            if (diffEl) {
                if (log.fsrs_snapshot && log.fsrs_snapshot.difficulty !== undefined) {
                    diffEl.textContent = parseFloat(log.fsrs_snapshot.difficulty).toFixed(1);
                } else {
                    diffEl.textContent = '-';
                }
            }

            // Interval (scheduled_days)
            const intervalEl = document.getElementById('hist-interval');
            if (intervalEl) {
                if (log.fsrs_snapshot && log.fsrs_snapshot.scheduled_days !== undefined) {
                    const days = log.fsrs_snapshot.scheduled_days;
                    intervalEl.textContent = days > 0 ? days + 'd' : '-';
                } else {
                    intervalEl.textContent = '-';
                }
            }

            // Retrievability
            const retrievabilityEl = document.getElementById('hist-retrievability');
            if (retrievabilityEl) {
                if (log.fsrs_snapshot && log.fsrs_snapshot.retrievability !== undefined) {
                    retrievabilityEl.textContent = (parseFloat(log.fsrs_snapshot.retrievability) * 100).toFixed(0) + '%';
                } else {
                    retrievabilityEl.textContent = '-';
                }
            }

            // FSRS State
            const fsrsStateEl = document.getElementById('hist-fsrs-state');
            if (fsrsStateEl && log.fsrs_snapshot) {
                const stateStr = String(log.fsrs_snapshot.card_state || 'NEW');
                const stateLabels = {
                    'NEW': 'New', 'LEARNING': 'Learning',
                    'REVIEW': 'Review', 'RELEARNING': 'Relearning'
                };
                fsrsStateEl.textContent = stateLabels[stateStr.toUpperCase()] || stateStr;
            } else if (fsrsStateEl) {
                fsrsStateEl.textContent = '-';
            }

            // Device
            const deviceEl = document.getElementById('hist-context-device');
            if (deviceEl) {
                const dev = (log.context_snapshot || {}).input_device || '-';
                deviceEl.textContent = dev;
            }

            // Rep Number
            const repEl = document.getElementById('hist-context-rep');
            if (repEl) {
                const rep = (log.context_snapshot || {}).reps_global;
                repEl.textContent = rep ? '#' + rep : '#' + (index + 1);
            }
        };

        // Re-init logic
        window.reinitVocabDetailTabs = function () {
            // Placeholder if needed for more complex init
        };

        const initModal = () => {
            const statsModal = document.getElementById('item-stats-modal');
            const statsContainer = document.getElementById('item-stats-container');
            const closeBtns = document.querySelectorAll('.js-close-stats-modal');

            if (statsModal) {
                statsModal.addEventListener('click', function (e) {
                    // Close if clicking directly on overlay (backdrop) OR on close button
                    if (e.target === statsModal || e.target.closest('.js-close-stats-modal')) {
                        statsModal.classList.remove('active');
                    }
                });
            }

            const editOverlay = document.getElementById('vocab-edit-overlay-modal');
            if (editOverlay) {
                editOverlay.addEventListener('click', function (e) {
                    if (e.target === editOverlay) {
                        window.closeVocabEditOverlay();
                    }
                });
            }

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && statsModal && statsModal.classList.contains('active')) {
                    statsModal.classList.remove('active');
                }
            });

            window.openVocabularyItemStats = function (itemId) {
                if (!statsModal || !statsContainer) return;
                statsModal.classList.add('active');
                statsContainer.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 16rem;"><i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #6366f1;"></i></div>';

                fetch('/learn/vocabulary/item/' + itemId + '/stats?modal=true&_cb=' + new Date().getTime())
                    .then(r => r.text())
                    .then(html => {
                        statsContainer.innerHTML = html;
                        if (window.reinitVocabDetailTabs) window.reinitVocabDetailTabs();

                        // Auto-select first history item
                        const firstHist = statsContainer.querySelector('.js-history-item');
                        if (firstHist && typeof window.selectHistoryItemV3 === 'function') {
                            window.selectHistoryItemV3(firstHist, 0);
                        }

                        // Initialize Charts
                        if (window.initVocabDetailCharts) {
                            window.initVocabDetailCharts(statsContainer);
                        }

                        const aiSub = document.getElementById('sub-ai');
                        if (aiSub && aiSub.style.display !== 'none') {
                            loadStatsAiHistory(itemId);
                        }
                    });
            };
        };

        window.playOrGenerateVocabAudio = function (btn, itemId, side, contentToRead, existingUrl) {
            if (!btn) return;

            const icon = btn.querySelector('i');
            const originalClass = icon ? icon.className : '';

            // 1. If we have a valid URL, just play it
            if (existingUrl && existingUrl !== 'None' && existingUrl !== '') {
                const audio = new Audio(existingUrl);
                audio.play().catch(err => {
                    console.warn("Audio play failed, attempting regeneration:", err);
                    regenerate();
                });
                return;
            }

            // 2. Otherwise, regenerate
            regenerate();

            function regenerate() {
                if (btn.classList.contains('generating')) return;

                btn.classList.add('generating');
                btn.disabled = true;
                if (icon) icon.className = 'fas fa-spinner fa-spin';

                const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';

                fetch('/learn/vocab-flashcard/regenerate-audio-from-content', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({
                        item_id: itemId,
                        side: side
                    })
                })
                    .then(r => r.json())
                    .then(data => {
                        btn.classList.remove('generating');
                        btn.disabled = false;
                        if (icon) icon.className = originalClass;

                        if (data.success && data.audio_url) {
                            // Update the button's onclick to use the new URL next time
                            btn.setAttribute('onclick', `window.playOrGenerateVocabAudio(this, ${itemId}, '${side}', '${contentToRead}', '${data.audio_url}')`);
                            // Play it
                            new Audio(data.audio_url).play();
                        } else {
                            alert("Lỗi tạo audio: " + (data.message || "Không rõ nguyên nhân"));
                        }
                    })
                    .catch(err => {
                        console.error("Audio generation fetch error:", err);
                        btn.classList.remove('generating');
                        btn.disabled = false;
                        if (icon) icon.className = originalClass;
                        alert("Lỗi kết nối khi tạo audio.");
                    });
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initModal);
        } else {
            initModal();
        }
    })();
</script>
